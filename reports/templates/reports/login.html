{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Отдел снабжения УВЗ</title>
    <link rel="stylesheet" href="{% static 'reports/bootstrap/css/bootstrap.min.css' %}">
    <style>
        body { background-color: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 2rem 2.5rem; width: 100%; max-width: 360px; }
        .login-title { font-size: 1rem; font-weight: 600; color: #2c2c2c; margin-bottom: 0.25rem; }
        .login-sub { font-size: 0.78rem; color: #888; margin-bottom: 1.5rem; }
        .form-label { font-size: 0.78rem; color: #555; margin-bottom: 0.25rem; }
        .form-control { font-size: 0.85rem; border-color: #ddd; }
        .form-control:focus { border-color: #e07b2a; box-shadow: 0 0 0 0.2rem rgba(224,123,42,0.15); }
        .btn-login { background-color: #e07b2a; border: none; color: #fff; width: 100%; font-size: 0.85rem; padding: 0.5rem; }
        .btn-login:hover { background-color: #c96a1e; color: #fff; }
        .error-msg { font-size: 0.8rem; color: #c0392b; margin-bottom: 1rem; }
        .login-footer { font-size: 0.72rem; color: #aaa; text-align: center; margin-top: 1.5rem; }
        .border-top-orange { border-top: 3px solid #e07b2a; border-radius: 8px 8px 0 0; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="border-top-orange" style="height:3px; margin:-2rem -2.5rem 1.5rem; border-radius:8px 8px 0 0;"></div>
    <div class="login-title">Отдел снабжения УВЗ</div>
    <div class="login-sub">Введите учётные данные для входа</div>

    {% if error %}
    <div class="error-msg">Неверный логин или пароль</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Логин</label>
            <input type="text" name="username" class="form-control" autofocus autocomplete="username">
        </div>
        <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-login">Войти</button>
    </form>

    <div class="login-footer">supply_service</div>
</div>
</body>
</html>
