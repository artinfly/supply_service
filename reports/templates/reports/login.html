{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — МТО УВЗ</title>
    <link rel="stylesheet" href="{% static 'reports/bootstrap/css/bootstrap.min.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #e07b2a;
            --orange-dark: #c96a1e;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Golos Text', sans-serif;
            background: #f2f2f2;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
        }
        .login-wrap {
            width: 100%; max-width: 360px; padding: 1rem;
        }
        .login-box {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .login-top {
            background: #1e1e1e;
            padding: 1.5rem 2rem 1.25rem;
            display: flex; align-items: center; gap: 0.75rem;
            border-bottom: 3px solid var(--orange);
        }
        .login-icon {
            width: 36px; height: 36px; border-radius: 8px;
            background: var(--orange);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .login-icon svg { width: 18px; height: 18px; fill: #fff; }
        .login-title { color: #fff; font-size: 0.95rem; font-weight: 700; line-height: 1.2; }
        .login-title span { display: block; font-size: 0.7rem; font-weight: 400; color: #888; margin-top: 0.1rem; }
        .login-body { padding: 1.75rem 2rem; }
        .form-label {
            font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.07em;
            color: #888; margin-bottom: 0.3rem; display: block;
        }
        .form-control {
            width: 100%; border: 1px solid #ddd; border-radius: 6px;
            padding: 0.45rem 0.75rem; font-size: 0.85rem;
            font-family: inherit; color: #1e1e1e;
            outline: none; transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-control:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(224,123,42,0.12);
        }
        .error-msg {
            font-size: 0.8rem; color: #c0392b;
            background: #fdf0ef; border-radius: 5px;
            padding: 0.45rem 0.75rem; margin-bottom: 1rem;
        }
        .btn-login {
            width: 100%; background: var(--orange); color: #fff;
            border: none; border-radius: 6px;
            padding: 0.55rem; font-size: 0.85rem;
            font-family: inherit; font-weight: 600;
            cursor: pointer; transition: background 0.15s;
            margin-top: 0.25rem;
        }
        .btn-login:hover { background: var(--orange-dark); }
        .login-footer {
            font-size: 0.7rem; color: #ccc;
            text-align: center; padding: 0.75rem;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-box">
        <div class="login-top">
            <div class="login-icon">
                <svg viewBox="0 0 24 24"><path d="M3 3h18v4H3zm0 6h11v4H3zm0 6h14v4H3z"/></svg>
            </div>
            <div class="login-title">
                МТО УВЗ
                <span>Введите учётные данные</span>
            </div>
        </div>
        <div class="login-body">
            {% if error %}
            <div class="error-msg">Неверный логин или пароль</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Логин</label>
                    <input type="text" name="username" class="form-control" autofocus autocomplete="username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Войти</button>
            </form>
        </div>
        <div class="login-footer">МТО УВЗ</div>
    </div>
</div>
</body>
</html>
