{% extends 'reports/base.html' %}
{% block title %}Все позиции{% endblock %}
{% block content %}
<div class="page-header"><h5>Все позиции</h5></div>

<div class="mb-2 d-flex gap-2 align-items-center">
    <span class="text-muted" style="font-size:0.8rem">Год:</span>
    <button class="btn btn-sm btn-year active" data-year="all">Все</button>
    {% for y, yc in year_cols %}
    <button class="btn btn-sm btn-year" data-year="{{ yc }}">{{ y }}</button>
    {% endfor %}
</div>

<div class="table-container" id="table-wrapper"></div>
<div id="page-data" data-api-url="{% url 'api_all_pps' %}"></div>
{% endblock %}

{% block extra_js %}
<script>
const COLS = [
    { field: 'igk', title: 'ИГК' },
    { field: 'c_agent', title: 'Контрагент' },
    { field: 'cfo', title: 'ЦФО' },
    { field: 'contract', title: 'Договор' },
    { field: 'status', title: 'Состояние' },
    { field: 'payment_type', title: 'Тип платежа' },
    { field: 'item', title: 'Предмет' },
    { field: 'order', title: 'Заказ' },
    { field: 'stage', title: 'Этап' },
    { field: 'spec_sum', title: 'Сумма спец., руб.', format: 'number' },
    { field: 'pp_sum', title: 'Сумма АП, руб.', format: 'number' },
    { field: 'pp_percent', title: '% АП', format: 'percent' },
    { field: 'pp_fact', title: 'Факт АП, руб.', format: 'number' },
    { field: 'fact_percent', title: '% факт', format: 'percent' },
    { field: 'pp_remain', title: 'Остаток АП, руб.', format: 'number' },
    { field: 'remain_percent', title: '% остаток', format: 'percent' },
    { field: 'plan_date', title: 'Дата плана' },
];

const apiUrl = document.getElementById('page-data').dataset.apiUrl;
let allData = [];
let activeYear = 'all';

function applyFilter() {
    const filtered = activeYear === 'all' ? allData : allData.filter(r => r[activeYear] == 1);
    renderTable(filtered);
}

function renderTable(data) {
    const container = document.getElementById('table-wrapper');
    if (!data.length) {
        container.innerHTML = '<div class="p-3 text-muted">Нет данных</div>';
        return;
    }
    let html = '<table class="report-table"><thead><tr>';
    COLS.forEach(col => { html += `<th>${col.title}</th>`; });
    html += '</tr></thead><tbody>';
    data.forEach((row, idx) => {
        html += `<tr>`;
        COLS.forEach(col => {
            let val = row[col.field];
            if (val === null || val === undefined) val = '';
            if (col.field === 'igk' && val !== '') val = fmtIgk(val);
            else if (col.field === 'stage' && val !== '') val = String(val).trim();
            else if (col.format === 'number' && val !== '')
                val = parseFloat(val).toLocaleString('ru-RU', {minimumFractionDigits:2, maximumFractionDigits:2});
            else if (col.format === 'percent' && val !== '') val = val + '%';
            const align = col.format ? 'text-end' : '';
            const wrap = !col.format ? 'wrap' : '';
            html += `<td class="${[align, wrap].filter(Boolean).join(' ')}">${val}</td>`;
        });
        html += '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
}

document.querySelectorAll('.btn-year').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.btn-year').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        activeYear = this.dataset.year;
        applyFilter();
    });
});

(async () => {
    const container = document.getElementById('table-wrapper');
    container.innerHTML = '<div class="loading-spinner"><div class="spinner-border spinner-border-sm me-2"></div>Загрузка...</div>';
    try {
        const resp = await fetch(apiUrl);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        allData = await resp.json();
        applyFilter();
    } catch(e) {
        container.innerHTML = `<div class="error-msg">Ошибка: ${e.message}</div>`;
    }
})();
</script>
{% endblock %}
