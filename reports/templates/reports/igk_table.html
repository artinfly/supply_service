{% extends 'reports/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="page-header">
    <h5>{{ title }}</h5>
</div>

<div class="table-container" id="table-wrapper"></div>

{# Передаём URL из Django в JS через data-атрибут #}
<div id="page-data"
     data-api-url="{% if report_type == 'concluded' %}{% url 'api_igk_concluded' year %}{% elif report_type == 'not_concluded' %}{% url 'api_igk_not_concluded' year %}{% else %}{% url 'api_igk_terminated' year %}{% endif %}">
</div>
{% endblock %}

{% block extra_js %}
<script>
const COLS = [
    { field: 'igk',            title: 'ИГК' },
    { field: 'spec_sum',       title: 'Сумма спец., руб.',  format: 'number' },
    { field: 'pp_sum',         title: 'Сумма АП, руб.',     format: 'number' },
    { field: 'pp_percent',     title: '% АП',               format: 'percent' },
    { field: 'pp_fact',        title: 'Факт АП, руб.',      format: 'number' },
    { field: 'fact_percent',   title: '% факт',             format: 'percent' },
    { field: 'pp_remain',      title: 'Остаток АП, руб.',   format: 'number' },
    { field: 'remain_percent', title: '% остаток',          format: 'percent' },
    { field: 'pp_quantity',    title: 'Кол-во ПП',          format: 'int' },
];

const apiUrl = document.getElementById('page-data').dataset.apiUrl;
loadTable(apiUrl, 'table-wrapper', COLS);
</script>
{% endblock %}
