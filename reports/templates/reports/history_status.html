{% extends 'reports/base.html' %}
{% block title %}История изменений статусов{% endblock %}

{% block content %}
<div class="page-header">
    <h5>Изменения договоров — статусы</h5>
</div>
<div class="table-container" id="table-wrapper"></div>
<div id="page-data" data-api-url="{% url 'api_history_status' %}"></div>
{% endblock %}

{% block extra_js %}
<script>
const COLS = [
    { field: 'igk',        title: 'ИГК' },
    { field: 'c_agent',    title: 'Контрагент' },
    { field: 'cfo',        title: 'ЦФО' },
    { field: 'contract',   title: 'Договор' },
    { field: 'old_status', title: 'Старый статус' },
    { field: 'new_status', title: 'Новый статус' },
    { field: 'payment_type', title: 'Тип платежа' },
    { field: 'item',       title: 'Предмет' },
    { field: 'plan_sum',   title: 'План, руб.',   format: 'number' },
    { field: 'fact_sum',   title: 'Факт, руб.',   format: 'number' },
    { field: 'update_date',  title: 'Дата изменения' },
    { field: 'upload_date',  title: 'Дата загрузки' },
    { field: 'c_date',       title: 'Год создания' },
];
const apiUrl = document.getElementById('page-data').dataset.apiUrl;
loadTable(apiUrl, 'table-wrapper', COLS);
</script>
{% endblock %}
